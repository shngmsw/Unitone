<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Dock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; user-select: none; }
    #service-dock {
      width: 64px;
      height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 12px;
    }
    #win-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 0 4px;
      width: 100%;
    }
    .win-btn {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: none;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .win-btn:hover { background: rgba(255,255,255,0.18); color: white; }
    #close-btn:hover { background: rgba(229,62,62,0.8); color: white; }
    #drag-zone {
      width: 40px; height: 20px;
      cursor: grab;
      flex-shrink: 0;
      margin-bottom: 4px;
    }
    #drag-zone:active { cursor: grabbing; }
    #app-logo {
      width: 40px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    #app-logo img { width: 28px; height: 28px; border-radius: 6px; }
    #service-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      overflow-y: auto;
      overflow-x: hidden;
      width: 100%;
      padding: 0 8px;
      scrollbar-width: none;
    }
    #service-list::-webkit-scrollbar { display: none; }
    .service-item {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      background: rgba(255,255,255,0.06);
      position: relative;
      transition: background 0.12s, transform 0.1s;
      flex-shrink: 0;
    }
    .service-item:hover { background: rgba(255,255,255,0.15); transform: scale(1.06); }
    .service-item.active { background: rgba(99,179,237,0.25); outline: 2px solid rgba(99,179,237,0.6); }
    .service-favicon { width: 24px; height: 24px; border-radius: 4px; object-fit: contain; }
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #e53e3e;
      color: white;
      border-radius: 9999px;
      font-size: 9px;
      font-weight: bold;
      min-width: 15px;
      height: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
    }
    .badge.hidden { display: none; }
    #dock-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 0 8px;
    }
    .dock-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.65);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }
    .dock-btn:hover { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.95); }
  </style>
</head>
<body>
  <aside id="service-dock">
    <div id="win-controls">
      <button id="close-btn" class="win-btn" title="閉じる">✕</button>
      <button id="maximize-btn" class="win-btn" title="最大化">□</button>
      <button id="minimize-btn" class="win-btn" title="最小化">—</button>
    </div>
    <div id="drag-zone" title="ドラッグで移動"></div>
    <div id="app-logo">
      <img src="../assets/icons/icon.png" alt="Hitotone" onerror="this.style.display='none'">
    </div>
    <div id="service-list"></div>
    <div id="dock-actions">
      <button id="add-service-btn" class="dock-btn" title="サービスを追加">+</button>
      <button id="toggle-ai-btn" class="dock-btn" title="AIコンパニオン">AI</button>
      <button id="settings-btn" class="dock-btn" title="設定">⚙</button>
    </div>
  </aside>
  <script type="module" src="./chrome.js"></script>
</body>
</html>
