name: Semantic Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: semantic-release
  cancel-in-progress: false

jobs:
  # リリース前にビルドが通るか確認（CI環境として）
  check:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev
      - name: Install dependencies
        run: npm ci
      - name: Build check
        run: npm run build

  release:
    needs: check
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.semantic-release.outputs.release_created }}
      tag_name: ${{ steps.get-tag.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release 2>&1 | tee release-output.txt
          if grep -q "Published release" release-output.txt; then
            echo "release_created=true" >> $GITHUB_OUTPUT
          else
            echo "release_created=false" >> $GITHUB_OUTPUT
          fi

      - name: Get latest tag
        id: get-tag
        if: steps.semantic-release.outputs.release_created == 'true'
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "tag_name=$LATEST_TAG" >> $GITHUB_OUTPUT

  # リリースが作成された場合、各プラットフォームのバイナリをビルドしてリリースに添付
  upload-assets:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag_name: ${{ needs.release.outputs.tag_name }}
    secrets: inherit
